<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Menu - Motion™</title>
    <link rel="stylesheet" href="../Admin Page/adminmenu.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Admin Header Section -->
    <div class="admin-header">
        <h1>Welcome to the Admin Menu</h1>
    </div>

    <!-- Navigation bar with conditional admin link -->
    <nav>
        <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a>
        <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
        <span id="adminLink">
            <a href="../Admin Page/adminmenu.html">Admin Menu</a>
        </span>
        <button class="logout-button" id="logoutButton">Logout</button>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <div class="admin-content">
            <!-- Create Team Member Form -->
            <div class="feature-box create-member">
                <h2>Create Team Member</h2>
                <form id="createTeamMemberForm">
                    <label for="memberName">Name:</label>
                    <input type="text" id="memberName" name="memberName" required><br><br>
                    <label for="memberEmail">Email:</label>
                    <input type="email" id="memberEmail" name="memberEmail" required><br><br>
                    <button class="admin-button" type="button" onclick="createTeamMember()">Add Member</button>
                </form>
            </div>

            <!-- Team Members List Table -->
            <div class="feature-box team-members">
                <h2>Team Members</h2>
                <div class="table-container">
                    <table id="teamMembersTable" class="list-view">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Username</th>
                                <th>Password</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="teamMembersList">
                            <!-- Team members will be listed here dynamically -->
                             
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Team Dashboard Button -->
            <div class="feature-box team-dashboard">
                <h2>Team Dashboard</h2>
                <p>View detailed progress of your team.</p>
                <a href="../Admin Page/teamdashboard.html"><button class="admin-button">Go to Team Dashboard</button></a>
            </div>

            <div><button id="burndownChartButton">View Burndown Chart</button></div>
        </div>
    </div>


    <!-- Edit Team Member Modal -->
    <div id="editMemberModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Team Member</h2>
            <form id="editTeamMemberForm">
                <div class="form-group">
                    <label for="editMemberName">Name:</label>
                    <input type="text" id="editMemberName" name="editMemberName" required>
                </div>
                <div class="form-group">
                    <label for="editMemberEmail">Email:</label>
                    <input type="email" id="editMemberEmail" name="editMemberEmail" required>
                </div>
                <div class="form-group">
                    <label for="editMemberUsername">Username:</label>
                    <input type="text" id="editMemberUsername" name="editMemberUsername" required>
                </div>
                <div class="form-group">
                    <label for="editMemberPassword">Password:</label>
                    <input type="text" id="editMemberPassword" name="editMemberPassword" required>
                </div>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Modal for Burndown Chart -->
    <div id="burndownChartModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Burndown Chart</h2>
            <canvas id="burndownChartCanvas"></canvas> <!-- Chart.js will render the chart here -->
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <div class="footer-content">
            <img src="../Photos/debugdivas.png" class="footer-logo">
            <div class="footer-text">
                <p>&copy; Debug Divas™. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript for logout, showing the admin link, and managing team members -->
    <script src="../Admin Page/adminmenu.js"></script>
    <script src="../Kanban Board/burndownChart.js"></script>
</body>

</html>
