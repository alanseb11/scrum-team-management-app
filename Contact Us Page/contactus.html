<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion™</title>
    <link rel="icon" href="../Photos/Motion Logo.png" type="image/png">
    <link rel="stylesheet" href="../Contact Us Page/contactus.css">
</head>

<body>
    <div class="main-container">
        <div class="contact-us">
            <h1>Contact Us!</h1>
        </div>

        <nav>
            <a href="../Home Page/homepage.html">Home</a>
            <a href="../Team Page/team.html">The Team</a>
            <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
            <a href="../Contact Us Page/contactus.html">Contact Us</a> 
            <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a> 
        </nav>
        
        <div class="contact" id="contact">
            <form action="/submit-contact" method="post">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required> <br> <br>
        
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required> <br> <br>
        
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" required></textarea> <br> <br>
        
                <input type="submit" value="Submit">
            </form>
        </div>
        <div>
            <footer>
                <div class="footer-content">
                    <img src="../Photos/debugdivas.png" class="footer-logo">
                    <div class="footer-text">
                        <p>&copy; Debug Divas™. All Rights Reserved.</p>
                    </div>
                </div>
            </footer>
        </div>
    </div>

</body>

</html>
