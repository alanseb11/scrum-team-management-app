<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Between Lists</title>
    <link rel="stylesheet" href="sprintbacklog.css">
</head>
<body>
    <header class="header-container">
        <div class="sprintbacklogscreen">
            <h1>Your Sprint Backlog</h1>
        </div>
        
        <nav>
            <a href="../Home Page/homepage.html">Home</a>
            <a href="../Team Page/team.html">The Team</a>
            <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
            <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a>
            <a href="../Contact Us Page/contactus.html">Contact Us</a>
        </nav>
    </header>
    

    <main class="main-container">
        <div class="list-container">
            <h2>To Do</h2>
            <ul id="list1" class="draggable-list">
                <li draggable="true">Task 1</li>
                <li draggable="true">Task 2</li>
                <li draggable="true">Task 3</li>
            </ul>
        </div>
    
        <div class="list-container">
            <h2>In Progress</h2>
            <ul id="list2" class="draggable-list">
                <li draggable="true">Task 4</li>
                <li draggable="true">Task 5</li>
            </ul>
        </div>
    
        <div class="list-container">
            <h2>Done</h2>
            <ul id="list3" class="draggable-list">
                <li draggable="true">Task 6</li>
            </ul>
        </div>
    </main>
    

        <!-- Footer -->
    <footer>
        <div class="footer-content">
            <img src="../Photos/debugdivas.png" class="footer-logo">
            <div class="footer-text">
                <p>&copy; Debug Divas™. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="sprintbacklog.js"></script>
</body>
</html>
