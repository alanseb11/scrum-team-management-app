<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Between Lists</title>
    <link rel="stylesheet" href="sprintbacklog.css">
</head>
<body>
    <header class="header-container">
        <div class="sprintbacklogscreen">
            <h1>Your Sprint Backlog</h1>
        </div>
        
        <nav id="nav">
            <a href="../Home Page/homepage.html">Home</a>
            <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
            <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a>
            <button class="logout-button" id="logoutButton">Logout</button>
        </nav>
    </header>
    

    <main class="main-container">
        <div class="table-container">
            <table id="sprintTable">
                <thead>
                    <tr>
                        <th>Sprint Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="sprintTableBody">
                    <!-- Data for table goes here with js -->
                </tbody>
            </table>
        </div>
        
        <button id="addSprintButton">Add New Sprint</button>

        <div id="sprintModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">Add New Sprint</h2>
                <form id="sprintForm">
                    <div class="form-group">
                        <label for="sprintName">Sprint Name:</label>
                        <input type="text" id="sprintName" required>
                    </div>

                    <div class="form-group">
                        <label for="startDate">Start Date:</label>
                        <input type="date" id="startDate" required>
                        <span id="startDateError" class="error-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="endDate">End Date:</label>
                        <input type="date" id="endDate" required>
                        <span id="endDateError" class="error-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status" required>
                            <option>Not Started</option>
                            <option>In Progress</option>
                            <option>Completed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pbi">Tasks:</label>
                        <div class="custom-multiselect" id="customMultiselect">
                            <div class="select-box">
                                <div class="selected-items" id="selectedItems">Select Product Backlog Items</div>
                                <div class="caret-down"></div>
                            </div>
                            <div class="options-container" id="optionsContainer"></div>
                        </div>
                        <input type="hidden" id="pbi" name="pbi">
                    </div>

                    <button type="submit">Save Sprint</button>
                </form>
            </div>
        </div>
    </main>


<!-- Footer -->
<footer>
    <div class="footer-content">
        <img src="../Photos/debugdivas.png" class="footer-logo">
        <div class="footer-text">
            <p>&copy; Debug Divas™. All Rights Reserved.</p>
        </div>
    </div>
</footer>

    <!-- JavaScript to manage user login and logout -->
<script src="../Login Page/loginpage.js"></script>
<script src="sprintbacklog.js"></script>
</body>
</html>
