<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Between Lists</title>
    <link rel="stylesheet" href="sprintbacklog.css">
</head>
<body>
    <header class="header-container">
        <div class="sprintbacklogscreen">
            <h1>Your Sprint Backlog</h1>
        </div>
        
        <nav>
            <a href="../Home Page/homepage.html">Home</a>
            <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
            <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a>
            <button class="logout-button" id="logoutButton">Logout</button>
        </nav>
    </header>
    

    <main class="main-container">
        <div class="list-container">
            <h2>Not Started</h2>
            <ul id="list1" class="draggable-list">
                <li draggable="true">Sprint 1</li>
                <li draggable="true">Sprint 2</li>
                <li draggable="true">Sprint 3</li>
            </ul>
        </div>
    
        <div class="list-container">
            <h2>Active</h2>
            <ul id="list2" class="draggable-list">
                <li draggable="true">Sprint 4</li>
                <li draggable="true">Sprint 5</li>
            </ul>
        </div>
    
        <div class="list-container">
            <h2>Completed</h2>
            <ul id="list3" class="draggable-list">
                <li draggable="true">Sprint 6</li>
            </ul>
        </div>

        <div><button id="addSprintButton">Add New Sprint</button></div>
    </main>
    

<!-- Modal for Adding/Editing Sprints -->
<div id="sprintModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add New Sprint</h2>
        <form id="sprintForm">
            <!-- task name -->
            <div class="form-group">
                <label for="sprintName">Sprint Name:</label>
                <input type="text" id="sprintName" name="sprintName" required>
            </div>
            

            <!-- start date -->
            <div class="form-group">
                <label for="startDate">Start Date:</label>
                <input type="date" id="startDate" name="startDate" required>
            </div>  

            <!-- end date -->
            <div class="form-group">
                <label for="endDate">End Date:</label>
                <input type="date" id="endDate" name="endDate" required>
            </div>  

            <!-- status -->
            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="not-started">Not Started</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pbi">Tags:</label>
                <div class="custom-multiselect" id="customMultiselect">
                    <div class="select-box">
                        <div class="selected-items" id="selectedItems">Select Product Backlog Items</div>
                        <div class="caret-down"></div>
                    </div>
                    <div class="options-container" id="optionsContainer">
                        <label><span>PBI 1</span><input type="checkbox" value="PBI 1"></label>
                        <label><span>PBI 2</span><input type="checkbox" value="PBI 2"></label>
                        <label><span>PBI 3</span><input type="checkbox" value="PBI 3"></label>
                        <label><span>PBI 4</span><input type="checkbox" value="PBI 4"></label>
                        <label><span>PBI 5</span><input type="checkbox" value="PBI 5"></label>
                        <label><span>PBI 6</span><input type="checkbox" value="PBI 6"></label>
                    
                    </div>
                </div>
                <input type="hidden" id="pbi" name="pbi">
            </div>

            
            <button type="submit">Save Sprint</button>
        </form>
    </div>
</div>


<!-- Footer -->
<footer>
    <div class="footer-content">
        <img src="../Photos/debugdivas.png" class="footer-logo">
        <div class="footer-text">
            <p>&copy; Debug Divas™. All Rights Reserved.</p>
        </div>
    </div>
</footer>

    <!-- JavaScript to manage user login and logout -->
    <script src="../Login Page/loginpage.js"></script>
<script src="sprintbacklog.js"></script>
</body>
</html>
