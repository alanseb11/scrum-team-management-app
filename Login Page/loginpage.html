<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion™</title>
    <link rel="icon" href="../Photos/Motion Logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../Login Page/loginpage.css">
</head>
<body>
    <div class="main-container">
        <div class="welcome-message">
            <img src="../Photos/Motion logo.png" alt="Motion Logo" class="motion-logo"><br><br>
        </div>
        
        <div class="container" id="signIn">
            <h1 class="form-title">Sign In</h1>
            <form id="loginForm" method="post">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div>
                    <input type="submit" class="btn" value="Sign In">
                </div>
        </div>

        <footer>
            <div class="footer-content">
                <img src="../Photos/debugdivas.png" class="footer-logo">
                <div class="footer-text">
                    <p>&copy; Debug Divas™. All Rights Reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <script src="../Login Page/loginpage.js"></script>
</body>
</html>
