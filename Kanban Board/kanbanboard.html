<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Between Lists</title>
    <link rel="stylesheet" href="kanbanboard.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header-container">
        <div class="sprintbacklogscreen">
            <h1>Your Kanban Board</h1>
        </div>
        
        <nav id="nav">
            <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a>
            <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
            <button class="logout-button" id="logoutButton">Logout</button>
        </nav>
    </header>
    

    <main class="main-container">
        <div class="list-container">
            <h2>Not Started</h2>
            <ul id="Not Started" class="draggable-list">
            </ul>
        </div>
    
        <div class="list-container">
            <h2>In Progress</h2>
            <ul id="In Progress" class="draggable-list">
            </ul>
        </div>
    
        <div class="list-container">
            <h2>Completed</h2>
            <ul id="Completed" class="draggable-list">
            </ul>
        </div>

        <div><button id="burndownChartButton">View Burndown Chart</button></div>
        <div><button id="completeSprintButton">Complete Sprint</button></div>

    </main>
    

<!-- Modal for Adding/Editing Sprints -->
<div id="sprintModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add A New Technical Task</h2>
        <form id="sprintForm">
            <!-- sprint name -->
            <div class="form-group">
                <label for="sprintName">Task Name:</label>
                <input type="text" id="sprintName" name="sprintName" required>
            </div>
            
            <!-- start date -->
            <div class="form-group">
                <label for="startDate">Start Date:</label>
                <input type="date" id="startDate" name="startDate" required>
                <span class="error-message" id="startDateError"></span>
            </div>  

            <!-- end date -->
            <div class="form-group">
                <label for="endDate">End Date:</label>
                <input type="date" id="endDate" name="endDate" required>
                <span class="error-message" id="endDateError"></span>
            </div>  

            <!-- status -->
            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="not-started">Not Started</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pbi">Tasks:</label>
                <div class="custom-multiselect" id="customMultiselect">
                    <div class="select-box">
                        <div class="selected-items" id="selectedItems">Select Product Backlog Items</div>
                        <div class="caret-down"></div>
                    </div>
                    <div class="options-container" id="optionsContainer"></div>
                </div>
                <input type="hidden" id="pbi" name="pbi">
            </div>

            
            <button type="submit">Save Sprint</button>
        </form>
    </div>
</div>

<!-- Modal for Adding/Editing Tasks -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Edit Task</h2>
        <form id="taskForm">
            <!-- task name -->
            <div class="form-group">
                <label for="taskName">Task Name:</label>
                <input type="text" id="taskName" name="taskName" required>
            </div>
            <!-- task type -->
            <div class="form-group">
                <label for="taskType">Task Type:</label>
                <select id="taskType" name="taskType">
                    <option>Story</option>
                    <option>Bug</option>
                </select>
            </div>
            <!-- priority -->
            <div class="form-group">
                <label for="priority">Priority:</label>
                <select id="priority" name="priority">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>Important</option>
                    <option>Urgent</option>
                </select>
            </div>
            <!-- Custom Multiselect for Tags -->
            <div class="form-group">
                <label for="tags">Tags:</label>
                <div class="custom-multiselect" id="customMultiselect">
                    <div class="select-box">
                        <div class="selected-items" id="selectedItems">Select Tags </div>
                        <div class="caret-down"></div>
                    </div>
                    <div class="options-container" id="optionsContainer">
                        <label><span>Frontend</span><input type="checkbox" value="Frontend"></label>
                        <label><span>Backend</span><input type="checkbox" value="Backend"></label>
                        <label><span>API</span><input type="checkbox" value="API"></label>
                        <label><span>Database</span><input type="checkbox" value="Database"></label>
                        <label><span>Framework</span><input type="checkbox" value="Framework"></label>
                        <label><span>Testing</span><input type="checkbox" value="Testing"></label>
                        <label><span>UI</span><input type="checkbox" value="UI"></label>
                        <label><span>UX</span><input type="checkbox" value="UX"></label>
                    </div>
                </div>
                <input type="hidden" id="tags" name="tags">
            </div>
            
            <!-- story points -->
            <div class="form-group">
                <label for="storyPoints">Story Points:</label>
                <input type="number" id="storyPoints" name="storyPoints" min="0" max="10" required>
            </div>
            <!-- sprint -->
            <div class="form-group">
                <label for="sprint">Sprint:</label>
                <input type="text" id="sprint" name="sprint" required>
            </div> 

            <!-- task description -->
            <div class="form-group">
                <label for="taskDescription">Task Description:</label>
                <input type="text" id="taskDescription" name="taskDescription" required>
            </div>

            <!-- stage -->
            <div class="form-group">
                <label for="stage">Stage:</label>
                <select id="stage" name="stage">
                    <option>Planning</option>
                    <option>Development</option>
                    <option>Testing</option>
                    <option>Integration</option>
                </select>
            </div>

            <!-- assignee -->
            <div class="form-group">
                <label for="taskMember">Assigned To:</label>
                <select id="taskMember" name="taskMember">
                    <option>Lisa</option>
                    <option>Amar</option>
                    <option>Alan</option>
                    <option>Sanjevan</option>
                    <option>Han</option>
                    <option>Michael</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dateWorkedOn">Date Worked on:</label>
                <input type="date" id="dateWorkedOn" name="startDate">
                <span class="error-message" id="startDateError"></span>
            </div>  

            <!-- story points -->
            <div class="form-group">
                <label for="hoursWorked">Number of Hours Worked:</label>
                <input type="number" id="amountOfHours" name="amountOfHours">
            </div>

            <button type="submit">Save Task</button>
        </form>
    </div>
</div>


<!-- Modal for Burndown Chart -->
<div id="burndownChartModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Burndown Chart</h2>
        <canvas id="burndownChartCanvas"></canvas> <!-- Chart.js will render the chart here -->
    </div>
</div>


<!-- Footer -->
<footer>
    <div class="footer-content">
        <img src="../Photos/debugdivas.png" class="footer-logo">
        <div class="footer-text">
            <p>&copy; Debug Divas™. All Rights Reserved.</p>
        </div>
    </div>
</footer>

    <!-- JavaScript to manage user login and logout -->
<script src="../Login Page/loginpage.js"></script>
<script src="kanbanboard.js"></script>
<script src="burndownChart.js"></script>
</body>
</html>
