<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Between Lists</title>
    <link rel="stylesheet" href="kanbanboard.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header-container">
        <div class="sprintbacklogscreen">
            <h1>Your Kanban Board</h1>
        </div>
        
        <nav id="nav">
            <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a>
            <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
            <button class="logout-button" id="logoutButton">Logout</button>
        </nav>
    </header>
    

    <main class="main-container">
        <div class="list-container">
            <h2>Not Started</h2>
            <ul id="Not Started" class="draggable-list">
            </ul>
        </div>
    
        <div class="list-container">
            <h2>In Progress</h2>
            <ul id="In Progress" class="draggable-list">
            </ul>
        </div>
    
        <div class="list-container">
            <h2>Completed</h2>
            <ul id="Completed" class="draggable-list">
            </ul>
        </div>

        <div><button id="burndownChartButton">View Burndown Chart</button></div>
    </main>
    

<!-- Modal for Adding/Editing Sprints -->
<div id="sprintModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add A New Technical Task</h2>
        <form id="sprintForm">
            <!-- sprint name -->
            <div class="form-group">
                <label for="sprintName">Task Name:</label>
                <input type="text" id="sprintName" name="sprintName" required>
            </div>
            
            <!-- start date -->
            <div class="form-group">
                <label for="startDate">Start Date:</label>
                <input type="date" id="startDate" name="startDate" required>
                <span class="error-message" id="startDateError"></span>
            </div>  

            <!-- end date -->
            <div class="form-group">
                <label for="endDate">End Date:</label>
                <input type="date" id="endDate" name="endDate" required>
                <span class="error-message" id="endDateError"></span>
            </div>  

            <!-- status -->
            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="not-started">Not Started</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pbi">Tasks:</label>
                <div class="custom-multiselect" id="customMultiselect">
                    <div class="select-box">
                        <div class="selected-items" id="selectedItems">Select Product Backlog Items</div>
                        <div class="caret-down"></div>
                    </div>
                    <div class="options-container" id="optionsContainer"></div>
                </div>
                <input type="hidden" id="pbi" name="pbi">
            </div>

            
            <button type="submit">Save Sprint</button>
        </form>
    </div>
</div>

<!-- Modal for Burndown Chart -->
<div id="burndownChartModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Burndown Chart</h2>
        <canvas id="burndownChartCanvas"></canvas> <!-- Chart.js will render the chart here -->
    </div>
</div>


<!-- Footer -->
<footer>
    <div class="footer-content">
        <img src="../Photos/debugdivas.png" class="footer-logo">
        <div class="footer-text">
            <p>&copy; Debug Divas™. All Rights Reserved.</p>
        </div>
    </div>
</footer>

    <!-- JavaScript to manage user login and logout -->
<script src="../Login Page/loginpage.js"></script>
<script src="kanbanboard.js"></script>
<script src="burndownChart.js"></script>
</body>
</html>
