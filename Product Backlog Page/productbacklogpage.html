<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion™</title>
    <link rel="icon" href="../Photos/Motion Logo.png" type="image/png">
    <link rel="stylesheet" href="../Product Backlog Page/productbacklogpage.css">
</head>

<nav>
    <a href="../Home Page/homepage.html">Home</a>
    <a href="../Team Page/team.html">The Team</a>
    <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
    <a href="../Contact Us Page/contactus.html">Contact Us</a> 
</nav>

<body>
    <h1>Product Backlog</h1>
    
    <table id="productBacklogTable">
        <thead>
            <tr>
                <th>User Story</th>
                <th>Priority</th>
                <th>Allocated Sprint</th>
                <th>Start Date</th>
                <th>Status</th>
                <th>Technical Task Description</th>
                <th>Allocated Task Member</th>
                <th>Actions</th>
            </tr>
        </thead>
        
        <tbody>
            <!-- Existing rows can be here -->
        </tbody>
    </table>
    
    <!-- Add a button to add a new row -->
    <button id="addRowButton">Add New Task</button>


    
<!-- The Modal -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add New Task</h2>
        <form id="taskForm">
            <div class="form-group">
                <label for="userStory">User Story:</label>
                <input type="text" id="userStory" name="userStory" required>
            </div>

            <div class="form-group">
                <label for="priority">Priority:</label>
                <select id="priority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sprint">Sprint:</label>
                <input type="text" id="sprint" name="sprint" required>
            </div>

            <div class="form-group">
                <label for="startDate">Start Date:</label>
                <input type="date" id="startDate" name="startDate" required>
            </div>

            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="in-progress">In Progress</option>
                    <option value="not-started">Not Started</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="technicalTask">Technical Task Description:</label>
                <input type="text" id="technicalTask" name="technicalTask" required>
            </div>

            <div class="form-group">
                <label for="taskMember">Allocated Task Member:</label>
                <select id="taskMember" name="taskMember">
                    <option value="None">None </option>
                    <option value="Lisa">Lisa </option>
                    <option value="Amar">Amar </option>
                    <option value="Alan">Alan </option>
                    <option value="Sanjevan">Sanjevan </option>
                    <option value="Han">Han </option>
                    <option value="Michael">Michael </option>
                </select>
            </div>

            <div class="form-group">
                <button type="submit">Save Task</button>
            </div>
        </form>
    </div>
</div>


    <div>
        <footer>
            <div class="footer-content">
                <img src="../Photos/debugdivas.png" class="footer-logo">
                <div class="footer-text">
                    <p>&copy; Debug Divas™. All Rights Reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- Link to the JavaScript file -->
    <script src="../Product Backlog Page/productbacklogpage.js"></script>
</body>
</html>
