<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion™ - Product Backlog</title>
    <link rel="icon" href="../Photos/Motion Logo.png" type="image/png">
    <link rel="stylesheet" href="../Product Backlog Page/productbacklogpage.css">
</head>
<body>

<div class="productbacklogscreen">
    <h1>Your Product Backlog</h1>
</div>

<nav>
    <a href="../Home Page/homepage.html">Home</a>
    <a href="../Team Page/team.html">The Team</a>
    <a href="../Product Backlog Page/productbacklogpage.html">Product Backlog</a>
    <a href="../Sprint Backlog Page/sprintbacklog.html">Sprint Backlog</a> 
    <a href="../Contact Us Page/contactus.html">Contact Us</a> 
    <button class="logout-button" id="logoutButton">Logout</button>
</nav>

<main class="main-container">
    <!-- Combined View Toggle and Filters in One Line -->
    <div class="view-filter-container">
        <div class="filter-sort">
            <label for="tagFilter">Filter by Tag:</label>
            <select id="tagFilter">
                <option value="">All </option>
                <option value="frontend">Frontend</option>
                <option value="backend">Backend</option>
                <option value="api">API</option>
                <option value="database">Database</option>
                <option value="framework">Framework</option>
                <option value="testing">Testing</option>
                <option value="ui">UI</option>
                <option value="ux">UX</option>
            </select>
    
            <label for="prioritySort">Sort by Priority:</label>
            <select id="prioritySort">
                <option value="asc">Low to High</option>
                <option value="desc">High to Low</option>
            </select>
    
            <label for="dateSort">Sort by Date:</label>
            <select id="dateSort">
                <option value="recent">Most Recent</option>
                <option value="oldest">Oldest First</option>
            </select>
        </div>
    
        <!-- Toggle Views -->
        <button id="toggleViewButton">Switch to Card View</button>
    </div>
    
    
    <div class = "table-container">
        <table id="productBacklogTable" class="list-view">
            <thead>
                <tr>
                    <th>Task Name</th>
                    <th>Priority</th>
                    <th>Tags</th>
                    <th>Story Points</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example Task 1 -->
                <tr>
                    <td>Example Task 1</td>
                    <td>Medium</td>
                    <td>Frontend, API</td>
                    <td>7</td>
                    <td>
                        <button class="editButton">Edit</button>
                        <button class="deleteButton">Delete</button>
                    </td>
                </tr>
                <!-- Example Task 2 -->
                <tr>
                    <td>Example Task 2</td>
                    <td>Urgent</td>
                    <td>Backend, Database</td>
                    <td>10</td>
                    <td>
                        <button class="editButton">Edit</button>
                        <button class="deleteButton">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    
    <div><button id="addRowButton">Add New Task</button></div>
</main>

<!-- Modal for Adding/Editing Tasks -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add New Task</h2>
        <form id="taskForm">
            <!-- task name -->
            <div class="form-group">
                <label for="taskName">Task Name:</label>
                <input type="text" id="taskName" name="taskName" required>
            </div>
            <!-- task type -->
            <div class="form-group">
                <label for="taskType">Task Type:</label>
                <select id="taskType" name="taskType">
                    <option value="story">Story</option>
                    <option value="bug">Bug</option>
                </select>
            </div>
            <!-- priority -->
            <div class="form-group">
                <label for="priority">Priority:</label>
                <select id="priority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="important">Important</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <!-- Custom Multiselect for Tags -->
            <div class="form-group">
                <label for="tags">Tags:</label>
                <div class="custom-multiselect" id="customMultiselect">
                    <div class="select-box">
                        <div class="selected-items" id="selectedItems">Select Tags </div>
                        <div class="caret-down"></div>
                    </div>
                    <div class="options-container" id="optionsContainer">
                        <label><span>Frontend</span><input type="checkbox" value="Frontend"></label>
                        <label><span>Backend</span><input type="checkbox" value="Backend"></label>
                        <label><span>API</span><input type="checkbox" value="API"></label>
                        <label><span>Database</span><input type="checkbox" value="Database"></label>
                        <label><span>Framework</span><input type="checkbox" value="Framework"></label>
                        <label><span>Testing</span><input type="checkbox" value="Testing"></label>
                        <label><span>UI</span><input type="checkbox" value="UI"></label>
                        <label><span>UX</span><input type="checkbox" value="UX"></label>
                    </div>
                </div>
                <input type="hidden" id="tags" name="tags">
            </div>
            
            <!-- story points -->
            <div class="form-group">
                <label for="storyPoints">Story Points:</label>
                <input type="number" id="storyPoints" name="storyPoints" min="0" max="10" required>
            </div>
            <!-- sprint -->
            <div class="form-group">
                <label for="sprint">Sprint:</label>
                <input type="text" id="sprint" name="sprint" required>
            </div>

            <!-- start date -->
            <div class="form-group">
                <label for="startDate">Start Date:</label>
                <input type="date" id="startDate" name="startDate" required>
            </div>  

            <!-- task description -->
            <div class="form-group">
                <label for="taskDescription">Task Description:</label>
                <input type="text" id="taskDescription" name="taskDescription" required>
            </div>

            <!-- status -->
            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="not-started">Not Started</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <!-- stage -->
            <div class="form-group">
                <label for="stage">Stage:</label>
                <select id="stage" name="stage">
                    <option value="planning">Planning</option>
                    <option value="development">Development</option>
                    <option value="testing">Testing</option>
                    <option value="integration">Integration</option>
                </select>
            </div>

            <!-- assignee -->
            <div class="form-group">
                <label for="taskMember">Assigned To:</label>
                <select id="taskMember" name="taskMember">
                    <option value="Lisa">Lisa</option>
                    <option value="Amar">Amar</option>
                    <option value="Alan">Alan</option>
                    <option value="Sanjevan">Sanjevan</option>
                    <option value="Han">Han</option>
                    <option value="Michael">Michael</option>
                </select>
            </div>
            <button type="submit">Save Task</button>
        </form>
    </div>
</div>
      
            

<!-- Footer -->
<footer>
    <div class="footer-content">
        <img src="../Photos/debugdivas.png" class="footer-logo">
        <div class="footer-text">
            <p>&copy; Debug Divas™. All Rights Reserved.</p>
        </div>
    </div>
</footer>

<!-- JavaScript to manage user login and logout -->
<script src="../Login Page/loginpage.js"></script>
<script src="../Product Backlog Page/productbacklogpage.js"></script>
</body>
</html>
